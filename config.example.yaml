# Copy to config.yaml and edit. Searches = wide-net trawls; the scorer ranks the catch.
# In Phase 2 this stays a local file; a phone-editable Google Sheet is a parked future phase.
poll_interval_seconds: 1800      # 30 min (auctions run ~7 days)
marketplace: EBAY_US
min_score: 6                     # floor for keep/alert; report applies per-section bars (repair 6, Rolex/chrono 10)
alert_limit: 25                  # max alerts per cycle
enrich: true                     # fetch item specifics (size/movement/box-papers) per candidate

# Searches are auto-constrained to the Wristwatches category (31387).
# condition_ids: 3000 = Used, 7000 = For parts / not working.
searches:
  - name: "Chronograph — auctions"
    query: "chronograph watch"
    buying_options: [AUCTION]
    condition_ids: [3000, 7000]

  - name: "Vintage chronograph"
    query: "vintage chronograph"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000, 7000]

  # ---- Path A: box & papers grails (used only, not for-parts) ----
  - name: "Rolex Submariner — full set"
    query: "rolex submariner box papers"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]

  - name: "Rolex Daytona — full set"
    query: "rolex daytona box papers"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]

  # ---- Other: non-chrono taste watches (feed the "Other" tab) ----
  - name: "Omega Seamaster"
    query: "omega seamaster"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]
  - name: "Tudor Black Bay"
    query: "tudor black bay"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]
  - name: "Jaeger-LeCoultre"
    query: "jaeger lecoultre"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]
  - name: "Patek Calatrava"
    query: "patek philippe calatrava"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]
  - name: "Cartier Tank"
    query: "cartier tank"
    buying_options: [AUCTION, FIXED_PRICE]
    condition_ids: [3000]
